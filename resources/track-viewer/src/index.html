<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Viewer</title>
</head>
<body>
  <div class="track-viewer-container">
    <div class="canvas-container">
      <div class="control-panel">
        <button id="mode-pan" class="control-button active">Pan / Zoom</button>
        <button id="mode-brush" class="control-button">Brush Select</button>
      </div>
      <canvas id="canvas"></canvas>
      <svg id="brush-overlay"></svg>
    </div>
    <div class="status-bar">
      <span id="status">Ready</span>
    </div>
  </div>
</body>
</html>
